<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg: #ffffff;
      --text: #333333;
      --accent: #2563eb;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      width: 160px;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 500;
    }
    
    /* Toggle Switch CSS */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #d1d5db;
      transition: .3s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(16px); }
    
    /* Number Input CSS */
    input[type="number"] {
      width: 48px;
      padding: 4px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
      outline: none;
    }
    input[type="number"]:focus { border-color: var(--accent); }
  </style>
</head>
<body>
  
  <div class="row">
    <span>Enable</span>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <span>Speed</span>
    <input type="number" id="speed" step="0.25" min="0.5" max="16.0" value="2.0">
  </div>

  <script src="popup.js"></script>
</body>
</html>
